<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gatito: Jugador vs Bot</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fce4ec; /* Rosa muy pálido */
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; /* Evita scrolls raros */
        }

        h1 { color: #d81b60; margin-bottom: 10px; font-weight: 300; }
        #status { font-size: 1.2rem; margin-bottom: 20px; font-weight: bold; }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 10px;
        }

        .cell {
            background-color: #fff;
            border: 2px solid #f06292;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .cell:hover:not(.taken) { background-color: #f8bbd0; transform: scale(1.05); }
        .cell.taken { cursor: not-allowed; }

        /* Estilo Corazón (Jugador) */
        .cell.heart { color: #e91e63; animation: appear 0.3s ease; }
        /* Estilo X (Bot) */
        .cell.x { color: #555; animation: appear 0.3s ease; }

        @keyframes appear {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        #restart-btn {
            margin-top: 30px;
            padding: 12px 24px;
            font-size: 1rem;
            background-color: #d81b60;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            display: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background-color 0.2s;
        }
        #restart-btn:hover { background-color: #ad1457; }

        /* Pantalla de Ganaste Total (Snoopy eliminado) */
        #win-screen {
            display: none; /* Oculto por defecto */
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #fce4ec; /* Mismo fondo */
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            animation: fadeInScreen 0.5s ease;
        }

        @keyframes fadeInScreen {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .big-heart {
            font-size: 10rem;
            color: #e91e63;
            margin-bottom: 20px;
            animation: heartBeat 1.3s infinite ease-in-out;
        }

        @keyframes heartBeat {
            0% { transform: scale(1); }
            15% { transform: scale(1.25); }
            30% { transform: scale(1); }
            45% { transform: scale(1.15); }
            60% { transform: scale(1); }
        }

        .win-message {
            font-size: 2.5rem;
            color: #d81b60;
            font-weight: bold;
            line-height: 1.2;
            max-width: 80%;
        }

        #restart-btn-win {
            margin-top: 40px;
            padding: 15px 30px;
            font-size: 1.1rem;
            background-color: #d81b60;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(216, 27, 96, 0.3);
        }
    </style>
</head>
<body>

    <h1>Gatito vs Bot</h1>
    <p>Tú eres: <span class="heart">❤️</span> | Bot es: <span class="x">X</span></p>
    <div id="status">Tu turno (❤️)</div>

    <div class="board" id="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
    </div>

    <button id="restart-btn" onclick="resetGame()">Jugar de nuevo</button>

    <div id="win-screen">
        <div class="big-heart">❤️</div>
        <div class="win-message">¡Ganaste!<br>y también ganaste mi corazón</div>
        <button id="restart-btn-win" onclick="resetGame()">Jugar de nuevo</button>
    </div>

    <script>
        const board = document.getElementById('board');
        const cells = document.querySelectorAll('.cell');
        const statusDisplay = document.getElementById('status');
        const restartBtn = document.getElementById('restart-btn');
        const winScreen = document.getElementById('win-screen');

        let gameActive = true;
        let currentPlayer = "❤️"; // Jugador humano
        let gameState = ["", "", "", "", "", "", "", "", ""];

        const humanPlayer = "❤️";
        const aiPlayer = "X";

        const winningConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // Horizontales
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // Verticales
            [0, 4, 8], [2, 4, 6]             // Diagonales
        ];

        // Manejar clic del jugador
        function handleCellClick(clickedCellEvent) {
            const clickedCell = clickedCellEvent.target;
            const clickedCellIndex = parseInt(clickedCell.getAttribute('data-index'));

            if (gameState[clickedCellIndex] !== "" || !gameActive || currentPlayer === aiPlayer) {
                return;
            }

            handleCellPlayed(clickedCell, clickedCellIndex);
            handleResultValidation();

            if (gameActive) {
                // Turno del bot después de 0.6s
                statusDisplay.innerHTML = "Turno del Bot (X)...";
                setTimeout(aiTurn, 600);
            }
        }

        function handleCellPlayed(clickedCell, clickedCellIndex) {
            gameState[clickedCellIndex] = currentPlayer;
            clickedCell.innerHTML = currentPlayer;
            clickedCell.classList.add('taken');
            clickedCell.classList.add(currentPlayer === humanPlayer ? 'heart' : 'x');
        }

        function handleResultValidation() {
            let roundWon = false;
            let winner = "";
            for (let i = 0; i < winningConditions.length; i++) {
                const winCondition = winningConditions[i];
                let a = gameState[winCondition[0]];
                let b = gameState[winCondition[1]];
                let c = gameState[winCondition[2]];
                if (a === '' || b === '' || c === '') { continue; }
                if (a === b && b === c) {
                    roundWon = true;
                    winner = a;
                    break;
                }
            }

            if (roundWon) {
                if (winner === humanPlayer) {
                    setTimeout(showWinScreen, 500); // Pequeño delay para ver la última jugada
                } else {
                    statusDisplay.innerHTML = "¡El Bot (X) ha ganado!";
                    statusDisplay.style.color = "#555";
                    restartBtn.style.display = "block";
                }
                gameActive = false;
                return;
            }

            let roundDraw = !gameState.includes("");
            if (roundDraw) {
                statusDisplay.innerHTML = "¡Empate!";
                statusDisplay.style.color = "#777";
                restartBtn.style.display = "block";
                gameActive = false;
                return;
            }
        }

        // --- Lógica del Bot ("Un poco difícil") ---
        function aiTurn() {
            if (!gameActive) return;

            let bestMove = -1;

            // 1. Comprobar si el Bot puede ganar en este turno
            bestMove = findWinningMove(aiPlayer);
            
            // 2. Si no, comprobar si necesita bloquear al jugador
            if (bestMove === -1) {
                bestMove = findWinningMove(humanPlayer);
            }

            // 3. Si no, intentar tomar el centro
            if (bestMove === -1 && gameState[4] === "") {
                bestMove = 4;
            }

            // 4. Si no, tomar una esquina disponible
            if (bestMove === -1) {
                const corners = [0, 2, 6, 8].filter(i => gameState[i] === "");
                if (corners.length > 0) {
                    bestMove = corners[Math.floor(Math.random() * corners.length)];
                }
            }

            // 5. Por último, tomar cualquier espacio vacío
            if (bestMove === -1) {
                const availableMoves = gameState.map((val, index) => val === "" ? index : null).filter(val => val !== null);
                if (availableMoves.length > 0) {
                    bestMove = availableMoves[Math.floor(Math.random() * availableMoves.length)];
                }
            }

            if (bestMove !== -1) {
                const cell = document.querySelector(`[data-index="${bestMove}"]`);
                currentPlayer = aiPlayer;
                handleCellPlayed(cell, bestMove);
                handleResultValidation();
                if (gameActive) {
                    currentPlayer = humanPlayer;
                    statusDisplay.innerHTML = "Tu turno (❤️)";
                }
            }
        }

        // Ayudante para encontrar movimientos ganadores o bloqueos
        function findWinningMove(player) {
            for (let i = 0; i < winningConditions.length; i++) {
                const [a, b, c] = winningConditions[i];
                // Caso: Dos celdas ocupadas por el mismo jugador y la tercera vacía
                if (gameState[a] === player && gameState[b] === player && gameState[c] === "") return c;
                if (gameState[a] === player && gameState[c] === player && gameState[b] === "") return b;
                if (gameState[b] === player && gameState[c] === player && gameState[a] === "") return a;
            }
            return -1;
        }

        // Mostrar pantalla de Ganaste
        function showWinScreen() {
            winScreen.style.display = 'flex';
        }

        function resetGame() {
            gameActive = true;
            currentPlayer = humanPlayer;
            gameState = ["", "", "", "", "", "", "", "", ""];
            statusDisplay.innerHTML = "Tu turno (❤️)";
            statusDisplay.style.color = "#333";
            restartBtn.style.display = "none";
            winScreen.style.display = 'none'; // Ocultar pantalla Ganaste
            cells.forEach(cell => {
                cell.innerHTML = "";
                cell.classList.remove('taken', 'heart', 'x');
            });
        }

        cells.forEach(cell => cell.addEventListener('click', handleCellClick));

    </script>
</body>
</html>
